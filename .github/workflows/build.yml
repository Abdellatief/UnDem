name: Build and Release UnDem

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  # ==========================================
  # 1. بيئة عمل ويندوز (Windows Builds)
  # ==========================================
  build-windows:
    name: Build Windows Packages
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Download Lightweight FFmpeg
        run: |
          curl -L -o ffmpeg.zip https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip
          tar -xf ffmpeg.zip
          Get-ChildItem -Path . -Filter "ffmpeg.exe" -Recurse | Move-Item -Destination .
          rm ffmpeg.zip

      - name: Build Single Portable EXE
        run: |
          if (Test-Path "logo.ico") {
            pyinstaller --noconfirm --onefile --windowed --icon="logo.ico" --add-data "logo.ico;." --add-data "ffmpeg.exe;." --name="UnDem_Portable_Windows_v1.3.0" undem.py
          } else {
            pyinstaller --noconfirm --onefile --windowed --add-data "ffmpeg.exe;." --name="UnDem_Portable_Windows_v1.3.0" undem.py
          }

      - name: Create Windows Compressed (.zip)
        run: |
          Compress-Archive -Path "dist/UnDem_Portable_Windows_v1.3.0.exe" -DestinationPath "dist/UnDem_Portable_Windows_v1.3.0.zip"

      - name: Create Inno Setup Script for Installer
        run: |
          $issContent = @"
          [Setup]
          AppName=UnDem
          AppVersion=1.3.0
          DefaultDirName={autopf}\UnDem
          DefaultGroupName=UnDem
          UninstallDisplayIcon={app}\UnDem_Portable_Windows_v1.3.0.exe
          Compression=lzma2
          SolidCompression=yes
          OutputDir=installer_out
          OutputBaseFilename=UnDem_Installer_v1.3.0
          SetupIconFile=logo.ico

          [Files]
          Source: "dist\UnDem_Portable_Windows_v1.3.0.exe"; DestDir: "{app}"; Flags: ignoreversion

          [Icons]
          Name: "{group}\UnDem"; Filename: "{app}\UnDem_Portable_Windows_v1.3.0.exe"
          Name: "{autodesktop}\UnDem"; Filename: "{app}\UnDem_Portable_Windows_v1.3.0.exe"
          "@
          if (Test-Path "logo.ico") {
              $issContent | Out-File -FilePath "setup.iss" -Encoding utf8
          } else {
              $issContent -replace 'SetupIconFile=logo.ico', '' | Out-File -FilePath "setup.iss" -Encoding utf8
          }

      - name: Compile Windows Installer (.exe)
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

      - name: Upload Windows Portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: UnDem_Portable_Windows_v1.3.0
          path: dist/UnDem_Portable_Windows_v1.3.0.exe

      - name: Upload Windows Compressed ZIP
        uses: actions/upload-artifact@v4
        with:
          name: UnDem_Portable_Windows_v1.3.0_ZIP
          path: dist/UnDem_Portable_Windows_v1.3.0.zip

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: UnDem_Installer_v1.3.0
          path: installer_out/UnDem_Installer_v1.3.0.exe

  # ==========================================
  # 2. بيئة عمل الماك (macOS Builds) - مُحدثة لحل المشكلة
  # ==========================================
  build-mac:
    name: Build macOS Packages
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Download macOS FFmpeg Binaries Directly
        run: |
          # تحميل الملف التنفيذي المباشر المستقر دون الحاجة لفك ضغط zip معقد
          curl -L -o ffmpeg https://github.com/eugeneoden/ffmpeg-macos/raw/master/ffmpeg
          # إعطاء صلاحيات التنفيذ لـ ffmpeg وهي خطوة إجبارية في الماك
          chmod +x ffmpeg

      - name: Build macOS App Bundle
        run: |
          # البناء باستخدام ملف ffmpeg المحلي الجاهز
          pyinstaller --noconfirm --windowed --add-data "ffmpeg:." --name="UnDem" undem.py

      - name: Create macOS Portable (.zip)
        run: |
          cd dist
          zip -r ../UnDem_Portable_Mac_v1.3.0.zip UnDem.app
          cd ..

      - name: Create macOS DMG Installer (.dmg)
        run: |
          mkdir dmg_root
          cp -r dist/UnDem.app dmg_root/
          hdiutil create -volname "UnDem Installer" -srcfolder dmg_root -ov -format UDZO UnDem_Mac_Installer_v1.3.0.dmg
          rm -rf dmg_root

      - name: Upload macOS Portable ZIP
        uses: actions/upload-artifact@v4
        with:
          name: UnDem_Portable_Mac_v1.3.0
          path: UnDem_Portable_Mac_v1.3.0.zip

      - name: Upload macOS DMG Installer
        uses: actions/upload-artifact@v4
        with:
          name: UnDem_Mac_Installer_v1.3.0
          path: UnDem_Mac_Installer_v1.3.0.dmg
