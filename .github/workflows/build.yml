name: Build and Release UnDem

on:
  push:
    tags:
      - 'v*' # سيعمل التلقائي فقط عندما تقوم بإنشاء إصدار جديد يبدأ بحرف v مثل v1.2.0
  workflow_dispatch: # يتيح لك تشغيله يدوياً أيضاً إذا أردت

jobs:
  build-and-release:
    name: Build and Publish Release
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        
    - name: Build Windows Portable EXE
      run: |
        python -m PyInstaller --noconfirm --onefile --windowed --add-data "logo.ico;." --icon="logo.ico" undem.py
        
    - name: Rename File with Version
      shell: bash
      run: |
        # أخذ رقم الإصدار لتسمية الملف بشكل احترافي
        VERSION=${GITHUB_REF#refs/tags/}
        if [[ "$VERSION" == refs/heads/* ]]; then VERSION="manual"; fi
        mv dist/undem.exe dist/UnDem_Portable_Windows_$VERSION.exe

    - name: Create GitHub Release and Upload Asset
      uses: softprops/action-gh-release@v2
      with:
        files: dist/UnDem_Portable_Windows_*.exe
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        body: "تم إنشاء هذا الإصدار تلقائياً بواسطة GitHub Actions بالأيقونة الجديدة والتحديثات الأخيرة."
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
