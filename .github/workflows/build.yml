name: Build and Release UnDem

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # 1️⃣ بناء ملفات الويندوز
  build-windows:
    name: Build Windows Outputs
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        
    - name: Build Windows Portable EXE
      run: |
        python -m PyInstaller --noconfirm --onefile --windowed --add-data "logo.ico;." --icon="logo.ico" undem.py
        
    - name: Create Windows Package Files
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        if [[ "$VERSION" == refs/heads/* ]]; then VERSION="main-build"; fi
        
        cp dist/undem.exe dist/UnDem_Portable_Windows_$VERSION.exe
        powershell Compress-Archive -Path dist/undem.exe -DestinationPath dist/UnDem_Portable_Windows_$VERSION.zip
        cp dist/undem.exe dist/UnDem_Installer_$VERSION.exe

    - name: Upload Windows Assets to Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/UnDem_Portable_Windows_*.exe
          dist/UnDem_Portable_Windows_*.zip
          dist/UnDem_Installer_*.exe
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 2️⃣ بناء ملفات الماك المعدل والمضمون
  build-mac:
    name: Build macOS DMG
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        
    - name: Build macOS App
      run: |
        # بناء برنامج الماك (إذا لم تتوفر الأيقونة بصيغة icns سيتجاوزها تلقائياً لتفادي الأخطاء)
        if [ -f "logo.icns" ]; then
          python -m PyInstaller --noconfirm --onefile --windowed --add-data "logo.ico:." --icon="logo.icns" undem.py
        else
          python -m PyInstaller --noconfirm --onefile --windowed undem.py
        fi
        
    - name: Create DMG Package (Native)
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        if [[ "$VERSION" == refs/heads/* ]]; then VERSION="main-build"; fi
        
        # استخدام أداة الماك الأصلية hdiutil المضمونة داخل السيرفر
        mkdir -p dist/dmg
        cp -R dist/undem.app dist/dmg/
        hdiutil create -volname "UnDem Installer" -srcfolder dist/dmg -ov -format UDZO dist/UnDem_Mac_$VERSION.dmg

    - name: Upload macOS Assets to Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: dist/UnDem_Mac_*.dmg
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
