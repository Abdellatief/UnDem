name: Build UnDem Desktop Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-style: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        
    - name: Build Windows Portable EXE
      run: |
        python -m PyInstaller --noconfirm --onefile --windowed --add-data "logo.ico;." --icon="logo.ico" undem.py
        
    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UnDem_Windows_Portable
        path: dist/undem.exe

  build-mac:
    runs-on: macos-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-style: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        
    - name: Build macOS App
      run: |
        python -m PyInstaller --noconfirm --onedir --windowed --icon="logo.icns" undem.py
        
    - name: Compress macOS App
      run: |
        cd dist
        zip -r UnDem_Portable_Mac.zip UnDem.app
        
    - name: Upload macOS Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UnDem_macOS_Portable
        path: dist/UnDem_Portable_Mac.zip
