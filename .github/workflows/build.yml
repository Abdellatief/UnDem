name: Build and Release UnDem

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    name: Build Windows Outputs
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build EXE with PyInstaller
        run: |
          # التحقق من وجود الأيقونة لمنع فشل الأمر إذا لم تكن مرفوعة
          if (Test-Path "logo.ico") {
            pyinstaller --noconfirm --onedir --windowed --add-data "logo.ico;." undem.py
          } else {
            pyinstaller --noconfirm --onedir --windowed undem.py
          }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnDem-Windows-Beta
          path: dist/
          if-no-files-found: warn

  build-macos:
    name: Build macOS DMG & Portable
    runs-on: macos-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Build App with PyInstaller
        run: |
          if [ -f "logo.ico" ]; then
            pyinstaller --noconfirm --onedir --windowed --add-data "logo.ico:." undem.py
          fi
          if [ ! -f "logo.ico" ]; then
            pyinstaller --noconfirm --onedir --windowed undem.py
          fi

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnDem-macOS-Beta
          path: dist/
          if-no-files-found: warn
