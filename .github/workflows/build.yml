name: Build and Release UnDem

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch: # هذا السطر السحري لتشغيله يدوياً بأي وقت

jobs:
  build-and-release:
    name: Build and Publish Release
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        
    - name: Build Windows Portable EXE
      run: |
        python -m PyInstaller --noconfirm --onefile --windowed --add-data "logo.ico;." --icon="logo.ico" undem.py
        
    - name: Upload Artifact (Temporary)
      uses: actions/upload-artifact@v4
      with:
        name: UnDem_Windows_Portable_EXE
        path: dist/undem.exe
