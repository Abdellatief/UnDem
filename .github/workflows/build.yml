name: Build UnDem Executable

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch: # يتيح لك تشغيل البناء يدوياً في أي وقت

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Build EXE with PyInstaller
      run: |
        pyinstaller --noconsole --onefile --name="UnDem" undem.py

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UnDem-Windows-EXE
        path: dist/UnDem.exe
