name: Build and Release UnDem

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-and-release:
    name: Build and Publish Release
    runs-on: windows-latest
    permissions:
      contents: write # صلاحية أساسية تسمح للـ Action برفع الملفات إلى الـ Releases
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller
        
    - name: Build Windows Portable EXE
      run: |
        python -m PyInstaller --noconfirm --onefile --windowed --add-data "logo.ico;." --icon="logo.ico" undem.py
        
    - name: Rename File with Version
      shell: bash
      run: |
        # تسمية الملف باسم الإصدار أو الـ Commit لتفادي التكرار
        VERSION=${GITHUB_REF#refs/tags/}
        if [[ "$VERSION" == refs/heads/* ]]; then VERSION="main-build"; fi
        mv dist/undem.exe dist/UnDem_Portable_Windows_$VERSION.exe

    - name: Update GitHub Release Automatically
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/') # يتم الرفع للـ Release فقط إذا تم إطلاق إصدار جديد
      with:
        files: dist/UnDem_Portable_Windows_*.exe
        tag_name: ${{ github.ref_name }}
        name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
