name: Build and Release UnDem

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows Outputs
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    # 📥 خطوة ذكية: تحميل FFmpeg رسمي آلياً على السيرفر لتضمينه في التجميعة
    - name: Setup FFmpeg for Build
      uses: FedericoCarboni/setup-ffmpeg@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Build Windows Portable EXE
      run: |
        # جلب مسار ffmpeg و ffprobe الفعلي من السيرفر لنسخهم جوة الـ EXE
        echo "Locating FFmpeg binaries..."
        $FFMPEG_PATH = (Get-Command ffmpeg).Source
        $FFPROBE_PATH = (Get-Command ffprobe).Source
        
        # تشغيل التجميع مع دمج الأيقونة وأدوات الفرمتة بملف واحد بورتـابل
        python -m PyInstaller --noconfirm --onefile --windowed --add-data "logo.ico;." --add-data "$FFMPEG_PATH;." --add-data "$FFPROBE_PATH;." --icon="logo.ico" undem.py
        
    - name: Create Inno Setup Script & Compile Installer
      shell: bash
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        if [[ "$VERSION" == refs/heads/* ]]; then VERSION="main-build"; fi
        
        cp dist/undem.exe dist/UnDem_Portable_Windows_$VERSION.exe
        powershell Compress-Archive -Path dist/undem.exe -DestinationPath dist/UnDem_Portable_Windows_$VERSION.zip
        
        cat <<EOF > setup.iss
        [Setup]
        AppName=UnDem
        AppVersion=$VERSION
        DefaultDirName={pf32}\UnDem
        DefaultGroupName=UnDem
        OutputDir=dist
        OutputBaseFilename=UnDem_Installer_$VERSION
        SetupIconFile=logo.ico
        Compression=lzma
        SolidCompression=yes
        DisableDirPage=no

        [Files]
        Source: "dist\undem.exe"; DestDir: "{app}"; Flags: ignoreversion

        [Icons]
        Name: "{group}\UnDem"; Filename: "{app}\undem.exe"
        Name: "{commondesktop}\UnDem"; Filename: "{app}\undem.exe"; Tasks: desktopicon

        [Tasks]
        Name: "desktopicon"; Description: "{cm:CreateDesktopIcon}"; GroupDescription: "{cm:AdditionalIcons}"; Flags: unchecked
        EOF
        
        "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" setup.iss

    - name: Upload Windows Preview Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UnDem-Windows-Preview
        path: |
          dist/UnDem_Portable_Windows_*.exe
          dist/UnDem_Portable_Windows_*.zip
          dist/UnDem_Installer_*.exe

    - name: Upload Windows Assets to Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/UnDem_Portable_Windows_*.exe
          dist/UnDem_Portable_Windows_*.zip
          dist/UnDem_Installer_*.exe
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-mac:
    name: Build macOS DMG & Portable
    runs-on: macos-latest
    permissions:
      contents: write
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyinstaller

    - name: Setup FFmpeg for macOS Build
      uses: FedericoCarboni/setup-ffmpeg@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}
        
    - name: Build macOS App
      run: |
        FFMPEG_PATH=$(which ffmpeg)
        FFPROBE_PATH=$(which ffprobe)
        if [ -f "logo.icns" ]; then
          python -m PyInstaller --noconfirm --onefile --windowed --add-data "logo.ico:." --add-data "$FFMPEG_PATH:." --add-data "$FFPROBE_PATH:." --icon="logo.icns" undem.py
        else
          python -m PyInstaller --noconfirm --onefile --windowed --add-data "$FFMPEG_PATH:." --add-data "$FFPROBE_PATH:." undem.py
        fi
        
    - name: Create DMG and Portable ZIP Packages
      run: |
        VERSION=${GITHUB_REF#refs/tags/}
        if [[ "$VERSION" == refs/heads/* ]]; then VERSION="main-build"; fi
        
        cd dist
        zip -r UnDem_Portable_Mac_$VERSION.zip undem.app
        cd ..
        
        mkdir -p dist/dmg
        cp -R dist/undem.app dist/dmg/
        hdiutil create -volname "UnDem Installer" -srcfolder dist/dmg -ov -format UDZO dist/UnDem_Mac_Installer_$VERSION.dmg

    - name: Upload macOS Preview Artifact
      uses: actions/upload-artifact@v4
      with:
        name: UnDem-Mac-Preview
        path: |
          dist/UnDem_Mac_Installer_*.dmg
          dist/UnDem_Portable_Mac_*.zip

    - name: Upload macOS Assets to Release
      uses: softprops/action-gh-release@v2
      if: startsWith(github.ref, 'refs/tags/')
      with:
        files: |
          dist/UnDem_Mac_Installer_*.dmg
          dist/UnDem_Portable_Mac_*.zip
        tag_name: ${{ github.ref_name }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
