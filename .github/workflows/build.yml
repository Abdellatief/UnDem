name: Build and Release UnDem

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build-windows:
    name: Build Windows Outputs
    runs-on: windows-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller

      - name: Download FFmpeg for Windows (Embedded)
        run: |
          curl -L -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          tar -xf ffmpeg.zip
          Get-ChildItem -Path . -Filter "ffmpeg.exe" -Recurse | Move-Item -Destination .
          rm ffmpeg.zip

      - name: Build Single EXE File
        run: |
          if (Test-Path "logo.ico") {
            pyinstaller --noconfirm --onefile --windowed --add-data "logo.ico;." --add-data "ffmpeg.exe;." undem.py
          } else {
            pyinstaller --noconfirm --onefile --windowed --add-data "ffmpeg.exe;." undem.py
          }

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v4
        with:
          name: UnDem-Windows-Single-EXE
          path: dist/undem.exe
          if-no-files-found: error
